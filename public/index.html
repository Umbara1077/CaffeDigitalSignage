<script>
  const RD_KEY = 'lastRedirectTs';
  const RD_COOLDOWN_MS = 12000; // keep your value

  // add "force" param (default false)
  function guardedReplace(url, force = false) {
    const last = parseInt(sessionStorage.getItem(RD_KEY) || '0', 10);
    if (!force && (Date.now() - last < RD_COOLDOWN_MS)) {
      console.warn('🛑 Redirect suppressed (cooldown).');
      return;
    }
    sessionStorage.setItem(RD_KEY, Date.now().toString());
    window.location.replace(url);
  }
</script>

    
<script>
document.addEventListener('DOMContentLoaded', () => {
  let retryAttempts = 0;
  const maxRetries = 3;

  // Fetch business hours directly from Firestore (no cache, no fallback)
  function fetchBusinessHours(callback) {
    const attemptFetch = (attempt = 0) => {
      console.log(`📡 Fetching business hours (attempt ${attempt + 1}/${maxRetries})`);

      hoursDB.collection("business_hours").doc("hours").get()
        .then((doc) => {
          if (!doc.exists) {
            console.error("❌ No business_hours doc found!");
            return;
          }

          const data = doc.data() || {};
          console.log("📢 Firestore raw data:", data);

          if (!data.openTime || !data.closeTime) {
            console.error("❌ Missing openTime or closeTime in Firestore!");
            return;
          }

          const openTime  = parseInt(data.openTime, 10);
          const closeTime = parseInt(data.closeTime, 10);

          const openHour    = Math.floor(openTime / 100);
          const openMinute  = openTime % 100;
          const closeHour   = Math.floor(closeTime / 100);
          const closeMinute = closeTime % 100;

          // Normalize openDays
          let openDays = [];
          if (Array.isArray(data.openDays)) {
            openDays = data.openDays.map(v => parseInt(v, 10)).filter(n => !isNaN(n));
          }
          if (openDays.length === 0) {
            console.warn("⚠️ openDays missing/empty, defaulting to all days");
            openDays = [0,1,2,3,4,5,6];
          }

          const businessHours = { openHour, openMinute, closeHour, closeMinute, openDays };
          retryAttempts = 0;
          callback(businessHours);
        })
        .catch((error) => {
          console.error(`❌ Firestore fetch error:`, error);
          if (attempt < maxRetries - 1) {
            const delay = Math.pow(2, attempt) * 1000;
            console.log(`🔄 Retrying in ${delay}ms...`);
            setTimeout(() => attemptFetch(attempt + 1), delay);
          }
        });
    };
    attemptFetch();
  }

  function checkTime(businessHours) {
    const now = new Date();
    const day = now.getDay();
    const hrs = now.getHours();
    const mins = now.getMinutes();

    console.log("—— index.html checkTime ——");
    console.log("🗓 Today’s day index:", day);
    console.log("⏰ Current time:", `${hrs}:${mins < 10 ? "0"+mins : mins}`);
    console.log("📅 Allowed openDays:", businessHours.openDays);

    const isBusinessDay = businessHours.openDays.includes(day);

    const { openHour, openMinute, closeHour, closeMinute } = businessHours;

    const afterOpen   = (hrs > openHour) || (hrs === openHour && mins >= openMinute);
    const beforeClose = (hrs < closeHour) || (hrs === closeHour && mins < closeMinute);
    const isOpenHours = isBusinessDay && afterOpen && beforeClose;

    console.log(`🕒 Schedule: ${openHour}:${openMinute} → ${closeHour}:${closeMinute}`);
    console.log("➡️ afterOpen:", afterOpen, "| beforeClose:", beforeClose);
    console.log("➡️ isBusinessDay:", isBusinessDay);
    console.log("➡️ FINAL isOpenHours:", isOpenHours);

    if (!isOpenHours) {
      console.log("🔴 Decided CLOSED → redirecting to early.html");
      setTimeout(() => { guardedReplace("early.html", true); }, 500);
    } else {
      console.log("🟢 Decided OPEN → staying on index.html");
    }
  }

  // Keep network monitoring
  function handleOnline() { console.log("🌐 Network up"); retryAttempts = 0; }
  function handleOffline() { console.log("📴 Network down"); }
  window.addEventListener('online', handleOnline);
  window.addEventListener('offline', handleOffline);

  function setupBusinessHoursCheck() {
    fetchBusinessHours(checkTime);
    const intervalId = setInterval(() => fetchBusinessHours(checkTime), 60000);
    window.addEventListener('beforeunload', () => clearInterval(intervalId));
  }

  setupBusinessHoursCheck();
});
</script>
