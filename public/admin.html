<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-auth.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="admin-script.js"></script>
    <script src="menu-seed-data.js"></script>
    <script src="menu-admin.js"></script>
    <link rel="icon" href="dolce-logo.png" type="image/x-icon">
    <style>
        .btn {
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        color: #fff;
        background-color: #007bff; 
        text-decoration: none;
        border-radius: 5px; 
        transition: background-color 0.3s ease; 
    }

    .btn:hover {
        background-color: #0056b3; 
    }

    .btn:active {
        background-color: #004085; 
    }

</style>
    <script>
        myAuth.onAuthStateChanged(user => {
            const currentPath = window.location.pathname;

            if (user && currentPath !== '/admin.html' && !sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                window.location.href = 'admin.html';
            } else if (!user && currentPath !== '/login.html' && !sessionStorage.getItem('redirected')) {
                sessionStorage.setItem('redirected', 'true');
                window.location.href = 'login.html';
            } else {
                sessionStorage.removeItem('redirected');
            }
        });
    </script>
    
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
    </header>
    <br></br>
    <a href="https://dolcevitasinage.web.app/admin.html" class="btn">Gelato Menu</a>
    <main>
        <section>
            <h2>Upload Video</h2>
            <form id="uploadVideoForm">
                <input type="file" id="videoFile" accept="video/mp4" required>
                <button type="submit">Upload Video</button>
            </form>
        </section>

        <section>
            <h2>Remove Video</h2>
            <select id="videoSelect">
                <option value="">Select a Video</option>
            </select>
            <button id="removeVideoButton">Remove Video</button>
        </section>

        <section>
            <h2>Current Videos</h2>
            <div class="current-menu-grid" id="currentVideos">

            </div>
        </section>

        <section class="menu-editor-panel">
            <h2>Menu Editor</h2>
            <p>Edit the live Gelato / Caffe Caldo / Caffe Freddo signage menus. Changes save to Firestore and update the TV pages instantly.</p>

            <div class="menu-editor-toolbar">
                <select id="menuEditorSelect">
                    <option value="">Select a menu...</option>
                </select>
                <button type="button" id="menuEditorReloadButton">Reload</button>
                <button type="button" id="menuEditorSaveButton">Save Changes</button>
                <button type="button" id="menuSeedButton">Seed Menu Data</button>
            </div>
            <p id="menuEditorStatus" class="menu-editor-status"></p>

            <div class="menu-editor-links">
                <a href="menu-gelato.html" target="_blank" class="btn">View Gelato Menu</a>
                <a href="menu-caffe-caldo.html" target="_blank" class="btn">View Caffe Caldo Menu</a>
                <a href="menu-caffe-freddo.html" target="_blank" class="btn">View Caffe Freddo Menu</a>
            </div>

            <div id="menuEditorForm" class="menu-editor-form"></div>
        </section>

        <section>
            <button id="viewMainPageButton">View Main Page</button>
        </section>
    </main>
    <script>
        document.getElementById('viewMainPageButton').addEventListener('click', () => {
    window.location.href = 'index.html'; 
});

    </script>
</body>
</html>
